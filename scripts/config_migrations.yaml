# Config migration rules — issue #194 stabilization week / Wave 8 / D7
#
# Each rule documents a safe-default flag flip we've shipped where the
# pre-flip value was unsafe enough that operators should be migrated
# even if their config.yaml is preserved across updates by
# setup-source.ps1. The migrator (scripts/migrate_config.py) only
# touches a key when the customer's CURRENT value equals
# ``old_default`` — that is the "this looks like the previous shipped
# default, not an operator customisation" signal. Any other value (an
# explicit operator choice) is left alone.
#
# Format (each entry):
#   - path:         "dot.separated.yaml.path"
#     old_default:  <previous shipped value>
#     new_default:  <current shipped value>
#     reason:       short string written to the migration log
#     pr:           "#NNN" of the shipping PR (audit trail)

migrations:
  # PR #174 — DuckDB ATTACH(READ_WRITE) per flush window deadlocks
  # against the writer pool on multi-million-row scans. Customer's WAL
  # leaked to 13+ GB and the scan kept hitting "database is locked".
  # New default is the executemany path which uses busy_timeout + retry.
  #
  # set_if_missing: the CODE-side default (src/storage/staging.py:
  # ``bool(ps_cfg.get("enabled", True))``) is True, so a preserved config
  # that never carried this key runs the unsafe path silently — and a
  # plain flip rule no-ops on an absent key. set_if_missing INSERTS
  # ``enabled: false`` so update.cmd reaches boxes whose config predates
  # the key (the #8/#9 customer: dashboard reports stuck because the live
  # parquet ingest locked the DB during a scan).
  - path: "scanner.parquet_staging.enabled"
    old_default: true
    new_default: false
    set_if_missing: true
    reason: "PR #174 — parquet_staging caused WAL contention + 'database is locked' on multi-million-row scans"
    pr: "#174"

  # PR #158 H-1 — dashboard previously bound 0.0.0.0:8085 unauth on
  # every install. Default flipped to loopback + bearer-token gate.
  - path: "dashboard.host"
    old_default: "0.0.0.0"
    new_default: "127.0.0.1"
    reason: "PR #158 — dashboard now binds loopback by default; operators on a LAN deployment must explicitly set 0.0.0.0"
    pr: "#158"

  # PR #131 — corruption_check=quick used to open the DB read-only at
  # startup and run an `integrity_check` that took 60+ seconds on
  # multi-GB DBs while the service appeared to hang.
  - path: "backup.corruption_check_mode"
    old_default: "quick"
    new_default: "skip"
    reason: "PR #131 — quick mode added 60+s startup pause on multi-GB DBs"
    pr: "#131"

  # PR #14 — polling watcher backend was the bootstrap default before
  # watchdog landed. On local NTFS the event-driven backend is
  # strictly better (sub-second event latency vs. 60s poll loop).
  - path: "watcher.backend"
    old_default: "polling"
    new_default: "watchdog"
    reason: "PR #14 — watchdog backend supersedes polling for local NTFS"
    pr: "#14"

  # Operator decision 2026-05-24 — enable the orphaned-SID report by default.
  # The fleet is domain-joined, so SIDs resolve via Windows LookupAccountSid
  # (pywin32) WITHOUT the optional active_directory LDAP config; the report is
  # read-only + cached, so default-on is low cost. The shipped config.yaml
  # already ships ``true`` (so this is a no-op there) — the rule only flips
  # preserved customer configs still carrying the old ``false``.
  - path: "security.orphan_sid.enabled"
    old_default: false
    new_default: true
    reason: "operator decision — orphaned-SID report on by default for domain-joined fleets (resolves via Windows LookupAccountSid; no LDAP config needed)"
    pr: "#56"

  # Issue #1 — owner shows "(Bilinmiyor)" on MFT scans. The MFT backend
  # is path-only; owner is resolved in the post-walk size-enrich pass
  # (#253) ONLY when scanner.read_owner is on. The code-side default is
  # False (src/scanner/size_enricher.py, src/utils/config_loader.py) while
  # the shipped config.yaml carries ``true`` — so a PRESERVED config that
  # never had the key collects no owners on a rescan, and the dashboard
  # stays "(Bilinmiyor)" forever. This is a PURE insert-when-absent rule:
  # old_default == new_default == true, so a present value is never
  # rewritten — an operator who explicitly set ``read_owner: false`` keeps
  # it off (current != old_default -> skipped), and a present ``true`` is a
  # no-op (current == new_default -> skipped). Only an ABSENT key triggers
  # the insert. NOTE: this just ENABLES collection; owners still populate
  # only after a completed rescan.
  - path: "scanner.read_owner"
    old_default: true
    new_default: true
    set_if_missing: true
    reason: "issue #1 — ensure owner collection is on so MFT rescans stop showing (Bilinmiyor); preserved configs missing the key fall back to code-default False"
    pr: "#1"
