name: CI

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

# Single concurrency group across every job in this workflow: pushing a
# new commit cancels the in-flight `syntax`, `lint`, `tests`, and
# `tests-windows` runs for the same ref so we never burn minutes on a
# stale SHA. The new `tests` job is the gating signal -- the old
# `syntax` import smoke is intentionally narrower now.
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  syntax:
    name: Python syntax check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: py_compile across src/ and entry points
        run: |
          python -m compileall -q src/ main.py dev_server.py

      - name: YAML config smoke check (catch unresolved merge markers)
        run: |
          python -c "import yaml; yaml.safe_load(open('config.yaml'))"
          # Bare grep guard for stray conflict markers in any tracked text file
          if grep -RnE '^(<<<<<<< |======= ?$|>>>>>>> )' \
              --include='*.py' --include='*.yml' --include='*.yaml' \
              --include='*.md' --include='*.html' --include='*.cmd' \
              --include='*.ps1' --include='*.txt' \
              --exclude-dir='.git' --exclude-dir='node_modules' . ; then
            echo "::error::Unresolved Git conflict markers detected"
            exit 1
          fi

      # NOTE: the previous "Import-level smoke test for cross-platform
      # modules" step (pip install duckdb pydantic + heredoc importing
      # AnalyticsEngine) was removed in #68. The new `tests` job below
      # installs the real requirements with a pip cache and runs the
      # full test suite, which exercises AnalyticsEngine and the storage
      # models properly. The old step was both redundant and a flaky
      # false-negative on ephemeral runners (pip install timeouts).

  lint:
    name: Ruff lint (non-blocking)
    runs-on: ubuntu-latest
    continue-on-error: true
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install ruff
        run: python -m pip install ruff --quiet

      - name: Run ruff (report only)
        run: ruff check src/ main.py dev_server.py --output-format=github || true

  # ---------------------------------------------------------------------
  # Pytest (Linux, Docker)
  #
  # Why Docker: the previous host-runner pytest job was failing in <10 s
  # on every PR because `pip install` choked on the GHA runner before
  # pytest could even collect tests -- a transient PyPI / wheel
  # availability issue, not a code bug. Baking the test environment into
  # a Docker image (built from `docker/Dockerfile.test`, see issue #91)
  # moves dependency resolution to image-build time, where it can be
  # cached and reused across runs. Once the image is built the only
  # per-CI work is `docker run`, which is deterministic and fast.
  #
  # How the cache works: `cache-from: type=gha` + `cache-to: type=gha,
  # mode=max` route Buildx layers through the GitHub Actions cache (the
  # same cache backend used by `actions/cache`, scoped to this repo and
  # free for public/private repos). On a warm hit, only the layers
  # whose inputs changed (e.g. requirements*.txt) are rebuilt; on a
  # cold miss, the full image is built and pushed to the cache for
  # subsequent runs. `mode=max` stores intermediate layers too, so
  # multi-stage builds benefit from incremental rebuilds. `load: true`
  # keeps the resulting image local to the runner -- no registry push.
  #
  # When to flip `continue-on-error` to `false`: after this job has
  # produced THREE consecutive green runs on master. At that point the
  # gate is real and a failing pytest should block the merge.
  # ---------------------------------------------------------------------
  tests:
    name: Pytest (Linux, Docker)
    runs-on: ubuntu-latest
    # Was advisory while pip-install on the runner stabilised.
    # Now the test environment is baked into a Docker image at build
    # time, so pip flakes can't fail the gate. Flip to gating once we
    # see a few green runs in a row.
    continue-on-error: true
    steps:
      - uses: actions/checkout@v6

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build test image (with cache)
        uses: docker/build-push-action@v5
        with:
          context: .
          file: docker/Dockerfile.test
          tags: fa-test:ci
          load: true
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Pytest collection summary
        run: |
          docker run --rm fa-test:ci --collect-only -q tests/

      - name: Run pytest
        run: |
          docker run --rm fa-test:ci --tb=short tests/ --ignore=tests/bench

  tests-windows:
    # Optional companion to the Linux `tests` job: re-runs the two
    # suites that exercise Windows-only code paths (orphaned-SID report
    # and ACL analyzer) on a real Windows runner so pywin32 imports get
    # smoke-tested. Marked continue-on-error because pywin32 wheel
    # availability + duckdb/pyarrow on windows-latest can be flaky and
    # we don't want to block PRs on transient PyPI / wheel issues. Flip
    # this to false once the job has been green for a few weeks.
    name: Pytest (Windows, advisory)
    runs-on: windows-latest
    continue-on-error: true
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: |
            requirements.txt
            requirements-dev.txt

      - name: Install runtime + dev dependencies (Windows)
        shell: pwsh
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r requirements.txt -r requirements-dev.txt

      - name: Run Windows-relevant tests
        shell: pwsh
        run: |
          python -m pytest --tb=short tests/test_orphan_sid.py tests/test_acl_analyzer.py

  powershell-syntax:
    name: PowerShell syntax check
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v6

      - name: Parse deploy/*.ps1
        shell: pwsh
        run: |
          $errors = 0
          Get-ChildItem deploy\*.ps1 | ForEach-Object {
            $tokens = $null
            $parseErrors = $null
            [System.Management.Automation.Language.Parser]::ParseFile(
              $_.FullName, [ref]$tokens, [ref]$parseErrors
            ) | Out-Null
            if ($parseErrors.Count -gt 0) {
              Write-Host "::error file=$($_.FullName)::Parse errors in $($_.Name)"
              $parseErrors | ForEach-Object { Write-Host "  $_" }
              $errors += $parseErrors.Count
            } else {
              Write-Host "[OK] $($_.Name)"
            }
          }
          if ($errors -gt 0) { exit 1 }
