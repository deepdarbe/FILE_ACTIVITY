# FILE ACTIVITY - Konfigürasyon Dosyası
# Windows Dosya Paylaşım Analiz ve Arşivleme Sistemi

general:
  language: "tr"              # "tr" veya "en"
  log_level: "INFO"
  log_file: "logs/file_activity.log"

backup:
  # Issue #77 — auto-backup for the SQLite DB.
  # Snapshots use VACUUM INTO so they're safe under WAL (no exclusive
  # lock). Daily snapshot job + pre-archive/retention/update hooks.
  enabled: true
  dir: "data/backups"
  keep_last_n: 10                 # Daily-rotation budget
  keep_weekly: 4                  # Plus the first snapshot of each of the last N ISO weeks
  daily_snapshot_hour: 2          # 24h, 0-23 (cron "0 H * * *")
  snapshot_on_update: true        # update.cmd takes a snapshot before reinstall
  snapshot_on_apply: true         # ArchiveEngine + RetentionEngine snapshot before non-dry-run
  # Phase 2 (#77): if true and the dashboard bootstrap detects DB
  # corruption (PRAGMA integrity_check fail OR critical tables missing),
  # the broken DB is forensic-renamed to file_activity.db.broken-<ts>
  # and replaced from the latest snapshot. Default false — opt-in only;
  # operators should review and consciously enable.
  auto_restore_on_corruption: false
  # Hotfix: which pragma the bootstrap corruption probe runs.
  #   "quick" (default) — PRAGMA quick_check, ~100x faster than
  #     integrity_check on multi-GB DBs (skips index reconciliation);
  #     still catches malformed pages / bad headers / disk image errors.
  #   "full"            — PRAGMA integrity_check, slow on big DBs but
  #     also reconciles every index. Use when ops suspect corruption.
  #   "skip"            — disable the probe entirely (NOT recommended
  #     unless you have an external integrity workflow).
  # Default 'skip' (was 'quick' before #131): on multi-GB DBs even
  # quick_check can take 60+s with WAL contention, blocking dashboard
  # startup. The probe's only role is to feed auto-restore — operators
  # who want it should explicitly opt into 'quick' or 'full'.
  corruption_check_mode: "skip"
  # Hard cap on the probe (seconds). If the pragma doesn't return in
  # this budget the probe aborts and assumes healthy + logs a WARNING.
  # Prevents a slow/locked DB from hanging dashboard startup forever.
  corruption_check_timeout_seconds: 30
  # Issue #153 Lever A — manual WAL checkpointer.
  # The daemon thread runs PRAGMA wal_checkpoint(TRUNCATE) when the
  # scanner is between batches OR every checkpoint_interval_seconds,
  # whichever comes first. checkpoint_force_threshold_mb is the safety
  # net: when the WAL grows past this size we force-truncate even if
  # the writer is hot. With this thread alive we set
  # PRAGMA wal_autocheckpoint=0 — the engine never checkpoints itself.
  checkpoint_interval_seconds: 30
  checkpoint_force_threshold_mb: 500

database:
  path: "data/file_activity.db"    # SQLite veritabani dosyasi
  retention:
    # Her kaynak icin kac eski scan tutulacak. Uygulamayi her baslattigimda
    # (Dashboard acilmadan once) eski scan'ler + ilgili scanned_files
    # silinir. Dashboard'un ilk acilista asili kalmamasi icin sart;
    # Overview sorgulari scan_runs x scanned_files cartesian yuku olusturur.
    # 0 = hic scan tutma (sadece en son), N = son N + guncel
    auto_cleanup_on_startup: true
    keep_last_n_scans: 3

# Issue #114 — pluggable storage backend.
# Phase 1 lands the SqliteBackend wrapper + StorageManager factory but
# does NOT change dashboard query behaviour. Phase 2 will add the
# 'elasticsearch' option (ElasticsearchBackend); Phase 3 rewires the
# dashboard query layer to call backend methods instead of raw SQL.
storage:
  backend: "sqlite"
  # Phase 2 (#114): switch to "elasticsearch" once the cluster is provisioned.
  # elasticsearch:
  #   hosts: ["https://es.internal:9200"]
  #   api_key: "${FILEACTIVITY_ES_API_KEY}"
  #   verify_certs: true
  #   request_timeout: 30

analytics:
  # DuckDB tabanli analitik motor. SQLite dosyasini salt-okunur ATTACH eder,
  # agir aggregate sorgulari (duplicate raporu, buyume, db_stats) icin kullanir.
  # Kapatilirsa tum sorgular klasik SQLite yolundan gider.
  enabled: true
  memory_limit: "512MB"           # DuckDB bellek siniri
  threads: 4                      # DuckDB paralel thread sayisi
  query_panel:
    # Yonetici ad-hoc SQL sorgu paneli (#48). DuckDB uzerinden SQLite'a
    # salt-okunur calisir, whitelist tablolar disindaki tum sorgulari
    # reddeder. Audit log'a sorgu kaydi yazilir (event_type=sql_query).
    # Opt-in: SQL ad-hoc panel exposes whitelisted tables to LAN; enable only on hardened deployments.
    enabled: false
    max_rows: 10000
    timeout_seconds: 30

active_directory:
  # Kullanici adindan e-posta ve tam ad cozumleme. Kullanici aktivite
  # detay sekmesinde gosterilir, bildirim e-postalari icin kullanilir.
  # enabled=false ise tum AD cagrilari no-op calisir (cache varsa doner).
  enabled: false
  server: ""                      # ornek: ldap://dc.firma.local veya ldaps://dc.firma.local:636
  bind_dn: ""                     # ornek: CN=svc_fileactivity,CN=Users,DC=firma,DC=local
  bind_password: ""               # Guvenlik: bos birakip AD_BIND_PASSWORD env var kullanin
  base_dn: ""                     # ornek: DC=firma,DC=local
  user_filter: "(sAMAccountName={username})"
  email_attribute: "mail"
  name_attribute: "displayName"
  cache_ttl_minutes: 60           # Sonuclar TTL boyunca SQLite'ta cache'lenir
  timeout_seconds: 5

smtp:
  # Kullanici verimlilik raporlari icin SMTP sunucu ayarlari.
  # enabled=false iken tum e-posta endpoint'leri no-op calisir.
  enabled: false
  host: ""                        # ornek: smtp.office365.com, smtp.gmail.com
  port: 587                       # 587 STARTTLS icin, 465 SSL icin, 25 plain
  use_tls: true                   # STARTTLS (587 kullaniyorsaniz true)
  use_ssl: false                  # Implicit TLS (465 kullaniyorsaniz true + use_tls: false)
  username: ""
  password: ""                    # Tavsiye: bos birakip SMTP_PASSWORD env var kullanin
  from_address: ""                # ornek: fileactivity@firma.local
  from_name: "File Activity System"
  timeout_seconds: 10

notifications:
  admin_cc_email: ""              # Her bildirime CC eklenecek yonetici adresi
  subject_prefix: "[File Activity]"

sources: []
  # Örnek:
  # - name: "Engineering"
  #   unc_path: "\\\\fileserver01\\engineering$"
  #   archive_dest: "D:\\Archive\\engineering"
  #   enabled: true

watcher:
  # Dosya degisikligi izleme (polling-based). Yeni/degisen/silinen dosyalar
  # bu aralikta scan_runs tablosuna yansir. Cok dusuk degerler FS'i yorar,
  # cok yuksek degerler degisikliklerin gorunmesini geciktirir.
  poll_interval_seconds: 60   # varsayilan 60 sn, minimum 10 sn (API zorlar)

scanner:
  max_workers: 4              # paralel dizin tarayıcı sayısı
  smb_workers: 32             # parallel os.scandir backend thread count (SMB: 32 sweet spot)
  # Issue #33: opt-in NTFS USN journal tail. Local NTFS + admin gerekir
  # (SMB / network drive icin desteklenmez). true ise polling devre disi,
  # yerine event-driven tail calisir (~sub-second latency). Desteklenmeyen
  # volume / izin yetersizse otomatik olarak polling'e duser.
  usn_tail_enabled: false
  usn_poll_interval_seconds: 1.0
  batch_size: 1000            # DB batch insert boyutu
  skip_hidden: true           # Hidden attribute'lu dosyaları atla
  skip_system: true           # System attribute'lu dosyaları atla
  exclude_patterns:           # atlanacak glob desenleri
    - "*.tmp"
    - "~$*"
    - "Thumbs.db"
    - "desktop.ini"
    - ".DS_Store"
  read_owner: true            # dosya sahiplik bilgisi topla (biraz yavaşlatır)
  incremental: true           # sadece değişen dosyaları tara
  # Issue #144 Phase 1 — yanlis-uzanti tespiti (Czkawka kalibi).
  # python-magic + libmagic gerektirir; default kapali (her dosya icin
  # libmagic.from_file() cagrisi tarama suresini uzatir). Acildiginda
  # tarama tamamlandiktan sonra ayri bir pas calisir (ana MFT/SMB
  # walk'u bloklamaz). libmagic kurulu degilse modul tek bir WARNING
  # log atip no-op'a duser; tarama normal sekilde devam eder.
  # Kurulum:
  #   pip install -r requirements-accel.txt
  detect_wrong_extensions: false
  # Issue #175 — post-walk size + timestamp enrich.
  # MFT enumeration is path-only by design (FSCTL_ENUM_USN_DATA). After
  # the walk we run a second pass with os.stat (or FSCTL_GET_NTFS_FILE_RECORD
  # on local NTFS) to fill file_size + mtime. ~50-500 dosya/sn on stat,
  # 10-50x faster on FSCTL. 3.1M-file scan estimated 2-5 dk.
  enrich_sizes: true
  size_enrich_workers: 8
  size_enrich_max_mb: 0   # 0 = enrich every file regardless of size
  parquet_staging:
    # Tarama sirasinda satirlari Parquet dosyasina biriktirir, sonra DuckDB
    # uzerinden tek INSERT ile SQLite'a ingest eder. 100k+ satirli scan'lerde
    # row-by-row INSERT'e gore 10-50x hizli; pyarrow yoksa otomatik olarak
    # klasik bulk_insert_scanned_files yoluna dusulur.
    enabled: true
    flush_rows: 50000         # buffer bu satira ulasinca flush et
    flush_seconds: 30         # son flush bu sn'den eski ise flush et
    staging_dir: "data/staging"
  # Issue #144 Phase 2 — perceptual hash for images.
  # pHash + dHash + aHash ile gorsel duplikasyon tespiti.
  # Varsayilan kapali (perf cost: her gorsel icin PIL acma + hash hesaplama).
  # Etkinlestirmek icin: scanner.compute_image_hashes: true
  # Yukleme: pip install imagehash>=4.3  (requirements-accel.txt)
  compute_image_hashes: false
  # pHash hesaplamasinda max dosya boyutu (MB). Bu degerin ustundeki
  # gorseller atlanir (4 GB TIFF = 5+ dakika). Varsayilan 200 MB.
  image_hash_max_mb: 200

analysis:
  frequency_buckets:          # erişim sıklığı analiz günleri
    - 30
    - 60
    - 90
    - 180
    - 365
  size_buckets:               # boyut eşikleri (bytes)
    tiny: 102400              # < 100 KB
    small: 1048576            # < 1 MB
    medium: 104857600         # < 100 MB
    large: 1073741824         # < 1 GB
    # üstü = huge

content_duplicates:
  # Icerik-tabanli kopya tespiti (tiered hash pipeline). Ayni boyutta
  # dosyalari once prefix hash (4 KB) ile eler, sonra tam SHA-256 ile
  # dogrular. Isim+boyut eslesmesinden daha yavas ama kesin.
  enabled: true
  min_bytes: 1048576          # 1 MB altindaki dosyalari atla
  workers: 4                  # ProcessPoolExecutor boyutu (CPU-bound)
  prefix_bytes: 4096          # Ilk 4 KB hash icin

duplicates:
  # Issue #83 Phase 1 — duplicate delete is QUARANTINE-only. Files are
  # MOVED to <dir>/<YYYYMMDD>/<sha1(parent)>/ with a SHA-256 sidecar +
  # JSON manifest; they are NEVER os.remove()'d in Phase 1. Hard delete
  # and the auto-cleanup job are Phase 2 follow-ups.
  #
  # The quarantine root MUST live on the same filesystem as the source
  # share — shutil.move falls back to copy+remove across volumes, which
  # defeats the "rename is atomic" property on Windows.
  quarantine:
    enabled: true               # global kill-switch — flip false in emergencies
    dir: "data/quarantine"
    bulk_delete_max_files: 500  # safety cap per request
    require_safety_token: true  # MUST remain true in prod (defence in depth)
    quarantine_days: 30         # Phase 2 auto-purge horizon
    purge_hour: 3               # daily_quarantine_purge cron hour (0-23, default 03:00)

archiving:
  verify_checksum: true       # SHA-256 doğrulama
  # Issue #158 (C-2) — safe-by-default. With dry_run=true the engine
  # walks the matched fileset, logs the planned moves, and updates the
  # archive index, but does NOT touch the source files. Operators flip
  # this off (or pass dry_run=false + confirm=true on the API) only
  # after they have inspected the dry-run report.
  dry_run: true               # taşımadan sadece raporla
  cleanup_empty_dirs: true    # boş dizinleri temizle

reports:
  output_dir: "reports"           # rapor çıktı dizini
  auto_report: true               # tarama sonrası otomatik rapor
  formats:                        # rapor formatları
    - html
    - json

forecast:
  # Kapasite / kota tahmini (issue #113). scan_runs.total_size_bytes
  # geçmişi üzerinde stdlib-only doğrusal regresyon çalıştırır; sonuç
  # /api/forecast/{source_id} ile JSON ve XLSX olarak sunulur. Salt
  # okunur olduğu için varsayılan olarak açıktır; alarm e-postası
  # smtp.enabled=false iken otomatik no-op çalışır.
  enabled: true
  default_horizon_days: 180
  capacity_threshold_pct: 85       # diskin %X dolduğunda alarm verilir
  alarm_email: ""                  # bos = alarm postasi yok; doldurulursa daily digest
  alarm_lead_days: 30              # alarm tarihi bu kadar gun icinde ise digest'e ekle

dashboard:
  # Issue #158 (C-1) — default-bind to loopback. Explicit
  # ``main.py dashboard --bind 0.0.0.0`` (with auth.enabled=true OR the
  # ``--i-know-what-im-doing`` opt-out) is required to expose the
  # dashboard on a LAN.
  host: "127.0.0.1"
  port: 8085
  auth:
    # Bearer-token gate enforced by src.security.dashboard_auth +
    # FastAPI middleware in src.dashboard.api.create_app.
    #   * enabled=true   → bearer token required from non-localhost.
    #   * enabled=false  → legacy unauthenticated mode (NOT recommended
    #                      with host=0.0.0.0; main.py refuses unless the
    #                      operator passes --i-know-what-im-doing).
    # Token NEVER lives in this file — export it via ``token_env`` so a
    # leaked config does not carry the credential.
    enabled: true
    token_env: "FILEACTIVITY_DASHBOARD_TOKEN"
    # Localhost callers (127.0.0.1 / ::1 / localhost) bypass the bearer
    # check by default so single-host installs and operator browsing
    # from RDP keep working without configuration. Set to false to
    # require the token from localhost too.
    allow_unauth_localhost: true

security:
  # Fidye yazilimi tespit motoru (#37). Watcher event akisini dinler,
  # asagidaki dort kuralla anomali yakalar ve opsiyonel olarak SMB
  # oturumlarini sonlandirir. auto_kill_session varsayilan kapali —
  # operator bilincli olarak acmali.
  ransomware:
    enabled: true
    rename_velocity_threshold: 50      # > N rename / dakika -> alert
    rename_velocity_window: 60         # saniye
    deletion_velocity_threshold: 100   # > M delete / dakika -> alert
    deletion_velocity_window: 60       # saniye
    risky_new_extensions:
      - encrypted
      - locked
      - crypto
      - crypt
      - wcry
      - wnry
      - ryk
      - lockbit
      - conti
      - cuba
    canary_file_names:
      - "_AAAA_canary_DO_NOT_DELETE.txt"
      - "_ZZZZ_canary_DO_NOT_DELETE.txt"
    auto_kill_session: false           # opt-in: SMB oturumunu Close-SmbSession ile sonlandir
    notification_email: ""             # bos degilse bu adrese kritik uyari maili gider

  # Orphaned-SID report + bulk reassignment (#56). Surfaces files whose
  # owner principal no longer resolves in AD (departed users, deleted
  # service accounts) and supports bulk re-owner to a manager / archive
  # account. Reassignment is Windows-only; the report itself works on
  # any platform. dry_run defaults true on the API; flip
  # require_dual_approval_for_reassign to enforce a 2-person rule.
  orphan_sid:
    enabled: true
    cache_ttl_minutes: 1440
    max_unique_sids: 1000
    require_dual_approval_for_reassign: false

compliance:
  # GDPR PII detection + retention engine (issue #58).
  # PII engine walks scanned_files for the latest scan, opens text-only
  # files (skipping binaries by extension), runs configurable regex
  # patterns and persists *redacted* hits to pii_findings. Snippets
  # never carry the raw match (e.g. "j***n@x.com"), so the table itself
  # is not a new PII liability. find_for_subject() is the Article 17/30
  # export driver. Retention engine evaluates fnmatch+age rules and
  # archives or deletes matching files; dry-run is the default.
  pii:
    enabled: false
    # Regex backend (issue #64). "auto" picks Intel Hyperscan when the
    # `hyperscan` Python package is importable (10-100x faster on
    # AVX2/AVX-512 CPUs), else falls back to stdlib `re`. Force one or
    # the other with "hyperscan" / "re". When "hyperscan" is requested
    # but unavailable a warning is logged and the engine falls back
    # rather than crashing the scan. Install the optional dep with:
    #   pip install -r requirements-accel.txt
    engine: "auto"             # "auto" | "hyperscan" | "re"
    text_extensions:
      - txt
      - csv
      - html
      - md
      - json
      - xml
      - yaml
    max_file_bytes: 1048576    # 1 MB per file scan
    snippet_max_length: 60
    patterns: {}               # extend DEFAULT_PATTERNS
  retention:
    enabled: false

audit:
  # Tamper-evident hash-chained audit log (issue #38).
  # When chain_enabled=true, every audit event written via the
  # chained variant also appends a row to audit_log_chain whose
  # row_hash = SHA-256(seq | event_id | prev_hash | canonical(event)).
  # Verification (GET /api/audit/verify) re-hashes the chain and
  # detects any retroactive tampering of file_audit_events rows.
  # Default: false (opt-in, no behaviour change).
  chain_enabled: false
  # WORM-storable JSONL exports — point this at a path you can later
  # promote to write-once storage (S3 Object Lock / Azure Immutable /
  # ZFS snapshot). Each export = one .jsonl file + optional .sig.
  worm_export_dir: "data/audit_export"
  # 7 years for HIPAA-style §164.312(b) audit-control retention.
  worm_retention_days: 2555
  # Optional Ed25519 PEM (or raw 32-byte) private key for detached
  # signatures over the export's SHA-256. Empty = no signing.
  signing_key_path: ""

compliance:
  # Legal hold registry (issue #59). Glob-tabanli yol donduruculer
  # arsiv / retention / cleanup adimlarinda eslesen yollari atlatir.
  # Hold'lar silinemez — sadece release edilebilir; tum add/release
  # olaylari audit log'a (chain'li mod aktifse hash-zincirine) yazilir.
  legal_hold:
    enabled: true
    poll_interval_minutes: 5
  # W3C PROV + DCAT v3 read-only standards endpoints (issue #145).
  # Mounts ``/api/compliance/lineage/file.jsonld`` and
  # ``/api/compliance/dcat/catalog.jsonld`` so data-governance
  # platforms (Apache Atlas, DataHub, Collibra) can ingest our scan
  # inventory + audit trail directly. Both endpoints are gated by the
  # bearer-token middleware (issue #158) like the rest of the API.
  standards:
    enabled: true
    # Base IRI used for PROV/DCAT entity identifiers in the emitted
    # JSON-LD. Falls back to the urn-form when left empty so the
    # output is still self-consistent.
    organization_uri: "urn:fileactivity:"
    # Default ``dct:license`` value attached to each Dataset in the
    # DCAT catalog. Override with an SPDX URL when distributing the
    # catalog externally.
    license_uri: "internal-use"

approvals:
  # Two-person approval framework (issue #112). Phase 1 wires the
  # snapshot restore endpoint as a proof of concept; archive_bulk,
  # purge_bulk and retention_apply are queued for follow-up PRs.
  # When ``enabled: false`` (default) every existing endpoint behaves
  # exactly as before — no row is queued, no second person is asked.
  # Self-approval (B == A) is refused server-side regardless of any
  # client-side disablement.
  enabled: false
  # Operations that require a second person before execution. Even
  # when ``enabled: true``, an op missing from this list runs straight
  # through the normal endpoint.
  require_for: []
  # e.g.:
  #   require_for: ['snapshot_restore', 'archive_bulk', 'purge_bulk',
  #                 'retention_apply']
  # Pending rows older than this are flipped to ``expired`` by an
  # hourly APScheduler job. 24h is the default — long enough for an
  # off-hours request to be approved, short enough to keep the queue
  # tidy.
  expiry_hours: 24
  # How the framework figures out *who* is calling the API:
  #   * 'windows'         — os.getlogin() (recommended on Windows hosts)
  #   * 'header'          — read identity_header (auth proxy in front)
  #   * 'client_supplied' — read body['username'] (UNSAFE; emits a
  #                         startup warning. Use only during evaluation.)
  identity_source: "client_supplied"
  identity_header: "X-Forwarded-User"

# Auto error reporting to GitHub Issues (issue #118, Phase 1).
# Disabled by default — flip ``enabled`` and export the token env var
# to opt in. With the defaults below the dashboard never makes a
# network call to GitHub, even when an unhandled exception occurs.
telemetry:
  enabled: false
  github:
    repo: "deepdarbe/file_activity"
    # Name of the env var that holds a fine-scoped GitHub PAT with
    # ``issues: write``. Never put the token itself in this file.
    token_env: "FILEACTIVITY_TELEMETRY_TOKEN"
    label: "auto-report"
  rate_limit:
    # Hard cap on issues/comments filed in any rolling 1-hour window.
    max_per_hour: 10
  privacy:
    # Strip UNC paths and Windows home-dir usernames from the report
    # body. Recommended on. Secret-keyed dict values are always
    # redacted regardless of this flag.
    redact_paths: true
